<!DOCTYPE html>
<html>
<head>
    <title>Database Results</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
        }
        th, td {
            padding: 12px;
            border: 1px solid #444;
        }
        th {
            background: #1e293b;
        }
        tr:hover {
            background: #334155;
        }
    </style>
</head>
<body>

<h2>📊 Interview Results (Database)</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Violations</th>
        <th>Risk Score</th>
        <th>Timestamp</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
